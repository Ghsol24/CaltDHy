<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – CaltDHy</title>
  <meta name="description" content="Log in to your CaltDHy expense management account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <!-- ANTI-FOUC: apply saved theme before first paint -->
  <script src="theme-manager.js"></script>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="orb2" aria-hidden="true"></div>

  <div class="pg-screw s-tl" aria-hidden="true"></div>
  <div class="pg-screw s-tr" aria-hidden="true"></div>
  <div class="pg-screw s-bl" aria-hidden="true"></div>
  <div class="pg-screw s-br" aria-hidden="true"></div>

  <header class="status-bar" aria-label="System status">
    <div class="led" aria-hidden="true"></div>
    <span class="status-label">Auth Module Active</span>
  </header>

  <main>
    <div class="module" role="region" aria-labelledby="mod-title">
      <div class="c-screw c-tl" aria-hidden="true"></div>
      <div class="c-screw c-tr" aria-hidden="true"></div>
      <div class="c-screw c-bl" aria-hidden="true"></div>
      <div class="c-screw c-br" aria-hidden="true"></div>

      <div class="mod-header">
        <span class="mod-eyebrow">CaltDHy // Auth</span>
        <h1 class="mod-title" id="mod-title">Access <span>System</span></h1>
      </div>

      <div class="vents" aria-hidden="true">
        <div class="vent"></div><div class="vent"></div><div class="vent"></div>
        <div class="vent"></div><div class="vent"></div>
      </div>

      <form id="loginForm" novalidate>

        <div class="fg" id="fgEmail">
          <input id="emailIn" class="finput" type="email" placeholder=" "
            autocomplete="email" oninput="validateEmail(this)" />
          <label class="flabel" for="emailIn">Email Address</label>
          <svg class="fg-check" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <div class="fg" id="fgPw">
          <div class="iw">
            <input id="pwIn" class="finput" type="password" placeholder=" "
              autocomplete="current-password" oninput="validatePw(this)" />
            <label class="flabel" for="pwIn">Password</label>
            <button type="button" class="eye-btn" onclick="togglePw('pwIn',this)" aria-label="Toggle password visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="forgot-row">
          <a href="reset-password.html" class="forgot-lnk">FORGOT PASSWORD?</a>
        </div>

        <div id="formErr" class="form-err" role="alert"></div>

        <button type="submit" class="btn-cta" id="submitBtn">
          <span class="spinner" aria-hidden="true"></span>
          <span class="btn-text">LOG IN</span>
        </button>

      </form>

      <div class="divider"><span>OR</span></div>
      <a href="index.html" class="btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        BACK TO HOME
      </a>

      <p class="mod-footer">No account yet? <a href="signup.html" class="lnk">SIGN UP</a></p>
    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
