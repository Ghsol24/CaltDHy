<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – CaltDHy</title>
  <meta name="description" content="Create your CaltDHy expense management account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <!-- ANTI-FOUC: apply saved theme before first paint -->
  <script src="theme-manager.js"></script>
    <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="orb2" aria-hidden="true"></div>

  <div class="pg-screw s-tl" aria-hidden="true"></div>
  <div class="pg-screw s-tr" aria-hidden="true"></div>
  <div class="pg-screw s-bl" aria-hidden="true"></div>
  <div class="pg-screw s-br" aria-hidden="true"></div>

  <!-- ── X CLOSE — back to index ── -->
  <button class="btn-close-page" onclick="window.location.href='index.html'" aria-label="Back to home">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <header class="status-bar" aria-label="System status">
    <div class="led" aria-hidden="true"></div>
    <span class="status-label">Registration Module Active</span>
  </header>

  <main>
    <div class="module" role="region" aria-labelledby="mod-title">
      <div class="c-screw c-tl" aria-hidden="true"></div>
      <div class="c-screw c-tr" aria-hidden="true"></div>
      <div class="c-screw c-bl" aria-hidden="true"></div>
      <div class="c-screw c-br" aria-hidden="true"></div>

      <div class="mod-header">
        <span class="mod-eyebrow">CaltDHy // Auth</span>
        <h1 class="mod-title" id="mod-title">Create <span>Account</span></h1>
      </div>

      <div class="vents" aria-hidden="true">
        <div class="vent"></div><div class="vent"></div><div class="vent"></div>
        <div class="vent"></div><div class="vent"></div>
      </div>

      <form id="signupForm" novalidate>

        <div class="fg">
          <input id="fullName" class="finput" type="text" placeholder=" "
            autocomplete="name" oninput="validateField(this, v => v.trim().length >= 2)" />
          <label class="flabel" for="fullName">Full Name</label>
        </div>

        <div class="fg">
          <input id="emailIn" class="finput" type="email" placeholder=" "
            autocomplete="email"
            oninput="validateField(this, v => /\S+@\S+\.\S+/.test(v.trim()))" />
          <label class="flabel" for="emailIn">Email Address</label>
        </div>

        <div class="fg">
          <div class="iw">
            <input id="pwIn" class="finput" type="password" placeholder=" "
              autocomplete="new-password" oninput="handlePwInput(this)" />
            <label class="flabel" for="pwIn">Password</label>
            <button type="button" class="eye-btn" onclick="togglePw('pwIn',this)" aria-label="Toggle password visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <!-- Password strength meter -->
          <div class="pw-strength" id="pwStrength" aria-live="polite">
            <div class="pw-strength__bar"><div class="pw-strength__fill" id="pwFill"></div></div>
            <span class="pw-strength__label" id="pwLabel">—</span>
          </div>
        </div>

        <div id="formErr" class="form-err" role="alert"></div>

        <button type="submit" class="btn-cta" id="submitBtn">
          <span class="spinner" aria-hidden="true"></span>
          <span class="btn-text">SIGN UP</span>
        </button>

      </form>

      <p class="mod-footer">Already have an account? <a href="login.html" class="lnk">LOG IN</a></p>
    </div>
  </main>

  <script src="signup.js"></script>
</body>
</html>
