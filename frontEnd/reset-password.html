<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bảo Mật Tài Khoản – CaltDHy</title>
  <meta name="description" content="Khôi phục hoặc đặt lại mật khẩu CaltDHy của bạn." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />

  <!-- ANTI-FOUC: apply saved theme before first paint -->
  <script src="theme-manager.js"></script>

    <link rel="stylesheet" href="css/auth.css" />
</head>

<body>
  <!-- Animated background orbs -->
  <div class="orb2" aria-hidden="true"></div>

  <!-- Page corner bolts -->
  <div class="pg-screw s-tl" aria-hidden="true"></div>
  <div class="pg-screw s-tr" aria-hidden="true"></div>
  <div class="pg-screw s-bl" aria-hidden="true"></div>
  <div class="pg-screw s-br" aria-hidden="true"></div>

  <!-- ── X CLOSE — back to login ── -->
  <button class="btn-close-page" onclick="window.location.href='login.html'" aria-label="Back to login">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <!-- Status LED -->
  <header class="status-bar" aria-label="System status">
    <div class="led" aria-hidden="true"></div>
    <span class="status-label" id="statusLabel">Security Module Active</span>
  </header>

  <main>
    <div class="module" role="region" aria-labelledby="mod-title">
      <!-- Module card corner screws -->
      <div class="c-screw c-tl" aria-hidden="true"></div>
      <div class="c-screw c-tr" aria-hidden="true"></div>
      <div class="c-screw c-bl" aria-hidden="true"></div>
      <div class="c-screw c-br" aria-hidden="true"></div>

      <!-- Header -->
      <div class="mod-header">
        <span class="mod-eyebrow" id="modEyebrow">CaltDHy // Security</span>
        <h1 class="mod-title" id="modTitle">Đặt Lại <span>Mật Khẩu</span></h1>
      </div>

      <!-- Vent decoration -->
      <div class="vents" aria-hidden="true">
        <div class="vent"></div><div class="vent"></div><div class="vent"></div>
        <div class="vent"></div><div class="vent"></div>
      </div>

      <p class="mod-hint" id="modHint">Đang tải cấu hình bảo mật...</p>

      <!-- Warning if link invalid/expired -->
      <div id="tokenWarn" class="token-warn" role="alert"></div>

      <!-- ── FORM 1: Yêu cầu gửi email (Forgot Password) ── -->
      <form id="forgotForm" class="u-hide" novalidate>
        <div class="fg">
          <input id="emailForgot" class="finput" type="email" placeholder=" "
            autocomplete="email" oninput="validateEmail(this)" />
          <label class="flabel" for="emailForgot">Địa chỉ Email</label>
        </div>

        <div id="forgotError" class="form-err" role="alert"></div>
        <div id="forgotSuccess" class="form-ok" role="status"></div>

        <button type="submit" class="btn-cta" id="forgotBtn">
          <span class="spinner" aria-hidden="true"></span>
          <span class="btn-text">GỬI YÊU CẦU</span>
        </button>
      </form>

      <!-- ── FORM 2: Nhập mật khẩu mới (Reset Password) ── -->
      <form id="resetForm" class="u-hide" novalidate>
        <div class="fg">
          <div class="iw">
            <input id="newPass" class="finput" type="password" placeholder=" "
              autocomplete="new-password" oninput="validatePw(this)" />
            <label class="flabel" for="newPass">Mật khẩu mới</label>
            <button type="button" class="eye-btn" onclick="togglePw('newPass', this)" aria-label="Hiện/ẩn mật khẩu">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="fg">
          <div class="iw">
            <input id="confirmPass" class="finput" type="password" placeholder=" "
              autocomplete="new-password" oninput="validatePw(this)" />
            <label class="flabel" for="confirmPass">Xác nhận mật khẩu</label>
            <button type="button" class="eye-btn" onclick="togglePw('confirmPass', this)" aria-label="Hiện/ẩn xác nhận mật khẩu">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="resetError" class="form-err" role="alert"></div>
        <div id="resetSuccess" class="form-ok" role="status"></div>

        <button type="submit" class="btn-cta" id="resetBtn">
          <span class="spinner" aria-hidden="true"></span>
          <span class="btn-text">ĐẶT LẠI MẬT KHẨU</span>
        </button>
      </form>

      <p class="mod-footer">Quay lại <a href="login.html" class="lnk">ĐĂNG NHẬP</a></p>
    </div>
  </main>

  <script src="reset-password.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
